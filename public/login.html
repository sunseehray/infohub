<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InfoHub — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
    }

    .login-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--ink);
      letter-spacing: -0.02em;
      text-align: center;
      margin-bottom: 8px;
    }
    .login-logo span { color: var(--accent); }

    .login-tagline {
      text-align: center;
      font-size: 0.82rem;
      color: var(--ink-muted);
      margin-bottom: 32px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
    }

    .login-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--ink);
      margin-bottom: 24px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 16px;
    }

    .form-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-input {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .form-input:focus { border-color: var(--accent); }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .remember-row input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
    .remember-row label { font-size: 0.82rem; color: var(--ink-muted); cursor: pointer; }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, opacity 0.15s;
    }
    .btn-login:hover   { background: #245c42; }
    .btn-login:disabled { opacity: 0.6; cursor: default; }

    .error-msg {
      display: none;
      background: var(--accent-warm-light);
      border: 1px solid var(--accent-warm);
      color: var(--accent-warm);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 0.82rem;
      margin-top: 14px;
      line-height: 1.45;
    }
    .error-msg.visible { display: block; }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.75rem;
      color: var(--ink-muted);
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">Info<span>Hub</span></div>
  <p class="login-tagline">Your household command centre</p>

  <div class="login-card">
    <div class="login-title">Sign in</div>

    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-input" type="text" id="username" autocomplete="username"
             placeholder="e.g. lmartin" autofocus />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" autocomplete="current-password"
             placeholder="••••••••" />
    </div>

    <div class="remember-row">
      <input type="checkbox" id="remember" />
      <label for="remember">Keep me signed in for 30 days</label>
    </div>

    <button class="btn-login" id="loginBtn">Sign in</button>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <p class="login-footer">InfoHub runs on your local network — your data stays home.</p>
</div>

<script>
  // ── Token storage ─────────────────────────────────────────────────────────
  // Access token lives in memory only (sessionStorage as a fallback for
  // page reloads — cleared when the tab closes, which is fine for a home app).
  // Refresh token (when "remember me" is used) goes in localStorage.

  const loginBtn  = document.getElementById('loginBtn');
  const errorMsg  = document.getElementById('errorMsg');
  const usernameEl = document.getElementById('username');
  const passwordEl = document.getElementById('password');
  const rememberEl = document.getElementById('remember');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('visible');
  }

  function clearError() {
    errorMsg.classList.remove('visible');
  }

  async function doLogin() {
    clearError();
    const username = usernameEl.value.trim();
    const password = passwordEl.value;
    const remember = rememberEl.checked;

    if (!username || !password) {
      showError('Please enter your username and password.');
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in…';

    try {
      const res  = await fetch('/api/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, password, remember }),
      });
      const json = await res.json();

      if (!res.ok) {
        showError(json.error || 'Login failed. Please try again.');
        return;
      }

      // Store access token for this session
      sessionStorage.setItem('infohub_token', json.accessToken);

      // Store refresh token if "remember me" was checked
      if (json.refreshToken) {
        localStorage.setItem('infohub_refresh', json.refreshToken);
      }

      // Store user profile for the app to use immediately
      sessionStorage.setItem('infohub_user', JSON.stringify(json.user));

      // Redirect to the main app
      window.location.href = '/';
    } catch (err) {
      showError('Could not reach the server. Check your connection.');
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign in';
    }
  }

  loginBtn.addEventListener('click', doLogin);

  // Allow pressing Enter in either field
  [usernameEl, passwordEl].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  });

  // If a refresh token exists, try to restore the session silently
  (async () => {
    const refresh = localStorage.getItem('infohub_refresh');
    if (!refresh) return;

    try {
      const res  = await fetch('/api/auth/refresh', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ refreshToken: refresh }),
      });
      if (res.ok) {
        const json = await res.json();
        sessionStorage.setItem('infohub_token', json.accessToken);
        window.location.href = '/';
      } else {
        localStorage.removeItem('infohub_refresh');
      }
    } catch {
      // Network error — just show the login form
    }
  })();
</script>
</body>
</html>
